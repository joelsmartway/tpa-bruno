info:
  name: Magic link
  type: http
  seq: 2

http:
  method: POST
  url: "{{back}}/v1/send-magic-link"
  body:
    type: json
    data: "{\r

      \    \"email\":\"testleader@smartway.es\",\r

      \    \"language\":\"en\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        bru.setVar("token", data.token);
        await bru.runRequest("AUTH/Signin");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
