info:
  name: Signin
  type: http
  seq: 1

http:
  method: POST
  url: "{{back}}/v1/signin"
  body:
    type: json
    data: "{\r

      \    \"token\": \"{{token}}\",\r

      \  \"language\": \"en\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
